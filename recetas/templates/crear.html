<h1>Nueva Receta</h1>

<form method="POST">

    {% csrf_token %}

    <input type="text"
           name="titulo"
           placeholder="Título">

    <br><br>

    <select name="categoria">

        <option value="Dulce">
            Dulce
        </option>

        <option value="Salada">
            Salada
        </option>

    </select>

    <br><br>

    <textarea name="ingredientes"
              placeholder="Ingredientes"></textarea>

    <br><br>

    <textarea name="preparacion"
              placeholder="Preparación"></textarea>

    <br><br>

    <button type="submit">
        Guardar
    </button>

</form>

<br>

<a href="/">Volver</a>
