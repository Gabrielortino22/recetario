{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Recetario | Iniciar sesión</title>

    <link rel="stylesheet" href="{% static 'css/estilos.css' %}">

</head>

<body class="login-body">

    <div class="login-wrapper">

        <div class="login-card">

            <h1>🍴 Recetario</h1>

            <p class="sub">
                Bienvenido. Iniciá sesión para continuar.
            </p>

            {% if messages %}

                {% for message in messages %}

                    <p class="error">
                        {{ message }}
                    </p>

                {% endfor %}

            {% endif %}

            <form method="post" action="{% url 'login' %}">

                {% csrf_token %}

                <label for="username">
                    Usuario
                </label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Ingrese su usuario"
                    required
                >

                <label for="pass">
                    Contraseña
                </label>

                <input
                    type="password"
                    id="pass"
                    name="password"
                    placeholder="Ingrese su contraseña"
                    required
                >

                <label class="mostrar-password">

                    <input
                        type="checkbox"
                        onclick="togglePass()"
                    >

                    👁 Mostrar contraseña

                </label>

                <br><br>

                <label for="rol">
                    Ingresar como
                </label>

                <select
                    id="rol"
                    name="rol"
                    required
                >

                    <option value="lector" selected>
                        📖 Lector
                    </option>

                    <option value="editor">
                        ✏️ Editor
                    </option>

                </select>

                <br><br>

                <button
                    type="submit"
                    class="btn-login"
                >

                    🔐 Ingresar

                </button>

            </form>

            <br>

            <div class="registro-container">

                <a
                    href="{% url 'registro' %}"
                    class="btn-registro"
                >

                    📝 Registrarse

                </a>

            </div>

            <br>

            <div class="recuperar-password">

                <a href="{% url 'password_reset' %}">

                    ¿Olvidaste tu contraseña?

                </a>

            </div>

        </div>

    </div>

<script>

function togglePass(){

    let p = document.getElementById("pass");

    if(p.type === "password"){

        p.type = "text";

    }else{

        p.type = "password";

    }

}

</script>

</body>

</html>
