{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña</title>

    <link rel="stylesheet"
          href="{% static 'css/estilos.css' %}">
</head>

<body class="fondo-receta">

<div class="contenedor">

    <div class="card">

        <h1>🔑 Recuperar contraseña</h1>

        <p>
            Ingresá tu correo electrónico.
        </p>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Enviar enlace
            </button>

        </form>

    </div>

</div>

</body>
</html>
