{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Nueva contraseña</title>

    <link rel="stylesheet"
          href="{% static 'css/estilos.css' %}">

</head>

<body class="fondo-receta">

<div class="contenedor">

    <div class="card">

        <h1>🔑 Nueva contraseña</h1>

        <p>
            Ingresá tu nueva contraseña.
        </p>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Guardar contraseña
            </button>

        </form>

    </div>

</div>

</body>

</html>
