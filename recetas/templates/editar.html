{% load static %}

<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Editar Receta</title>

    <link rel="stylesheet"
          href="{% static 'css/estilos.css' %}">

</head>

<body class="fondo-receta">

<div class="contenedor">

    <div class="card">

        <h1>Editar Receta</h1>

        <form method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            <label>Título</label>

            <input type="text"
                   name="titulo"
                   value="{{ receta.titulo }}">

            <br><br>

            <label>Categoría</label>

            <select name="categoria">

                <option value="Dulce"
                    {% if receta.categoria == 'Dulce' %}
                        selected
                    {% endif %}>
                    Dulce
                </option>

                <option value="Salada"
                    {% if receta.categoria == 'Salada' %}
                        selected
                    {% endif %}>
                    Salada
                </option>

            </select>

            <br><br>

            <label>Ingredientes</label>

            <textarea name="ingredientes">{{ receta.ingredientes }}</textarea>

            <br><br>

            <label>Preparación</label>

            <textarea name="preparacion">{{ receta.preparacion }}</textarea>

            <br><br>

            {% if receta.imagen %}

                <img src="{{ receta.imagen.url }}"
                     alt="{{ receta.titulo }}">

                <br><br>

            {% endif %}

            <label>Imagen</label>

            <input type="file"
                   name="imagen">

            <br><br>

            <button type="submit">
                Actualizar
            </button>

        </form>

        <br>

        <a href="{% url 'lista' %}">
            Volver
        </a>

    </div>

</div>

</body>

</html>
