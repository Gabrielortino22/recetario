{% extends 'base.html' %}

{% block titulo %}
Editar Receta
{% endblock %}

{% block contenido %}

<div class="card">

    <h1>Editar Receta</h1>

    <form method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        <label>Título</label>

        <input type="text"
               name="titulo"
               value="{{ receta.titulo }}">

        <br><br>

        <label>Categoría</label>

        <select name="categoria">

            <option value="Dulce"
                {% if receta.categoria == 'Dulce' %}
                    selected
                {% endif %}>
                Dulce
            </option>

            <option value="Salada"
                {% if receta.categoria == 'Salada' %}
                    selected
                {% endif %}>
                Salada
            </option>

        </select>

        <br><br>

        <label>Ingredientes</label>

        <textarea name="ingredientes">{{ receta.ingredientes }}</textarea>

        <br><br>

        <label>Preparación</label>

        <textarea name="preparacion">{{ receta.preparacion }}</textarea>

        <br><br>

        <!-- IMAGEN ACTUAL -->
        {% if receta.imagen %}

            <img src="{{ receta.imagen.url }}"
                 alt="{{ receta.titulo }}">

            <br><br>

        {% endif %}

        <label>Imagen</label>

        <input type="file"
               name="imagen">

        <br><br>

        <!-- VIDEO ACTUAL -->
{% if receta.video %}

    <p><strong>Video actual:</strong></p>

    <video class="video-mini" controls>

        <source src="{{ receta.video.url }}" type="video/mp4">

        Tu navegador no soporta video.

    </video>

{% endif %}

        <label>Video</label>

        <input type="file"
               name="video"
               accept="video/*">

        <br><br>

        <button type="submit">
            Actualizar
        </button>

    </form>

    <br>

    <a href="{% url 'lista' %}">
        ← Volver
    </a>

</div>

{% endblock %}
